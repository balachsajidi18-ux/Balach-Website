<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balach Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <h2>Balach</h2>
        <nav>
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Product</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>I design modern website</p>
        <button>Get Started</button>
    </section>


    <section class="Services">
        <div class="service">Web Design</div>
        <div class="service">UI Design</div>
        <div class="service">Responsive Design</div>
    </section>


    <section class="Products">
        <div class="card">
            <img src="./images/gettyimages-1202789131-612x612.jpg" width="200" alt="image">
            <h3>Product 1</h3>
            <p>$10</p>
        </div>

        <div class="card">
            <img src="./images/gettyimages-1388226392-612x612.jpg" width="200" alt="image">
            <h3>Poduct 2</h3>
            <p>$20</p>
        </div>

        <div class="card">
            <img src="./images/gettyimages-1419645742-612x612.jpg" width="200" alt="image">
            <h3>Product 3</h3>
            <p>$50</p>
        </div>
    </section>

    <section class="about">
        <h2>About Me</h2>
        <p>I am learning web development and building project.</p>
    </section>

    <section class="contact">
        <h2>Contact Me</h2>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button>send</button>
    </section>


    <footer class="footer">
        <p>2026 Balach</p>
    </footer>


</body>
</html>
